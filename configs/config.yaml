llm:
  openai_base_url: "${OPENAI_BASE_URL}"
  api_key: "${OPENAI_API_KEY}"
  model_name: "${OPENAI_MODEL_NAME}"
  temperature: 0.1
  max_tokens: 4096

# 意图识别专用 LLM（小模型，仅用于 reranker 置信度不足时的 LLM 兜底）
router_llm:
  openai_base_url: "${ROUTER_LLM_BASE_URL}"
  api_key: "${ROUTER_LLM_API_KEY}"
  model_name: "${ROUTER_LLM_MODEL_NAME}"
  temperature: 0.1
  max_tokens: 256

# 路由配置（Embedding 初筛 → Reranker 精排 → Margin 置信度）
router:
  confidence_threshold: 0.6                     # 低于此分数 fallback 到 router_llm LLM 意图识别兜底
  margin_temperature: 2.0                       # margin→confidence 映射锐度，越大越严格
  embedding_top_k: 2                            # Embedding 初筛保留前几名，再交给 Reranker 精排
  category_descriptions:
    chat:   "日常对话和闲聊，比如打招呼、问候、聊天、回顾之前的对话内容"
    rag:    "查询文档资料和知识库，询问上传文件中包含的具体信息和内容"
    mcp:    "进行数学计算或使用工具服务，比如加减乘除、单位换算、查询天气、抓取网页信息"
    vision: "分析识别用户上传的图片，描述图片中的内容、场景和细节"

milvus:
  host: "localhost"
  port: 19530
  collection_name: "rag_docs"
  embedding_model: "BAAI/bge-small-zh-v1.5"
  embedding_dim: 512
  index_params:
    metric_type: "IP"
    index_type: "IVF_FLAT"

mcp:
  servers:
    - name: "calculator"
      command: "python"
      args: ["-m", "app.mcp_servers.calculator_server"]
      env: {}
    - name: "fetch"
      command: "uvx"
      args: ["mcp-server-fetch"]
      env: {}

rag:
  chunk_size: 500
  chunk_overlap: 50
  top_k: 16        # 先召回候选文档数量
  rerank_enabled: true    # 是否启用重排序
  rerank_model: "BAAI/bge-reranker-base"  # 重排序模型（中文原生 Cross-Encoder，同时用于路由分类）
  rerank_batch_size: 4    # 批处理大小（内存控制）
  rerank_output_k: 4      # 重排序后输出数量

paddle_ocr:
  endpoint: "https://paddleocr.aistudio-app.com/api/v2/ocr/jobs"
  token: "${PADDLEOCR_ACCESS_TOKEN}"
  model: "PaddleOCR-VL-1.6"

vision:
  openai_base_url: "${VL_BASE_URL}"
  api_key: "${VL_API_KEY}"
  model_name: "${VL_MODEL_NAME}"
  temperature: 0.1
  max_tokens: 2048
  phases: "simple"       # "simple"=VL提取+LLM回答(快), "full"=4阶段含自检+补偿(慢但准确)

main_agent:
  cot_prompt_template: |
    你是一个智能路由器。用户问题是：{query}
    可用的子代理：
    - chat：一般对话、闲聊、问候、回顾对话历史
    - rag：需要外部知识/文档检索（用户上传了文件或询问文档内容）
    - mcp：需要工具执行具体操作（数学计算、加减乘除、单位转换、汇率查询、天气查询、网页抓取等）
    - vision：需要识别图片内容（用户上传了图片或询问图片相关问题）
    注意：如果用户上传了图片（image_ids 不为空），优先路由到 vision。
    请用 JSON 格式输出你的决策，包含 "target" 和 "reasoning" 字段。
    例如：{"target": "mcp", "reasoning": "用户需要进行数学计算"}
    例如：{"target": "rag", "reasoning": "用户询问上传的文档内容"}
    例如：{"target": "vision", "reasoning": "用户询问图片内容"}
    例如：{"target": "chat", "reasoning": "一般问候对话"}
  fallback_agent: "chat"

server:
  host: "0.0.0.0"
  port: 8000
  max_file_size_mb: 10

preprocess:
  enable_typo_correction: true
  typo_model: "shibing624/macbert4csc-base-chinese"

langfuse:                          # Langfuse 可观测性配置（可选）
  enabled: true                    # 是否启用链路追踪，默认 false
  host: "${LANGFUSE_BASE_URL}"     # Langfuse 服务地址，默认 https://cloud.langfuse.com
  public_key: "${LANGFUSE_PUBLIC_KEY}"   # 公开密钥（从 Langfuse 项目设置获取）
  secret_key: "${LANGFUSE_SECRET_KEY}"   # 密钥（从 Langfuse 项目设置获取）
