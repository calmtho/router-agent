<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流式聊天测试</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1a73e8;
            color: white;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 500;
        }
        main {
            flex: 1;
            display: flex;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            overflow: hidden;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
        .sidebar {
            width: 300px;
            background: white;
            border-right: 1px solid #ddd;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            background: #1a73e8;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant-message {
            align-self: flex-start;
            background: white;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }
        .reasoning-message {
            align-self: flex-start;
            background: #f0f7ff;
            border: 1px solid #c3d4e8;
            border-radius: 8px;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 13px;
            color: #555;
            max-width: 90%;
        }
        .input-area {
            padding: 20px 24px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 12px;
        }
        textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            min-height: 52px;
            max-height: 150px;
        }
        textarea:focus {
            outline: none;
            border-color: #1a73e8;
        }
        button {
            padding: 12px 24px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1557b0;
        }
        button:disabled {
            background: #8ab4f8;
            cursor: not-allowed;
        }
        .status-bar {
            padding: 8px 16px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .status-item span {
            font-weight: 500;
            color: #333;
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        .agent-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            margin-top: 8px;
        }
        .error-message {
            align-self: center;
            background: #fff5f5;
            border: 1px solid #fc8181;
            color: #c53030;
            border-radius: 8px;
            max-width: 80%;
            font-size: 13px;
        }
        .system-message {
            align-self: center;
            background: #fffbeb;
            border: 1px solid #fbbf24;
            color: #92400e;
            border-radius: 8px;
            max-width: 80%;
            font-size: 13px;
            padding: 8px 16px;
        }
        .agent-chat { background: #e8f5e9; color: #2e7d32; }
        .agent-rag { background: #fff3e0; color: #ef6c00; }
        .agent-mcp { background: #fce4ec; color: #c2185b; }

        /* 上传相关样式 */
        .input-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
        }
        .uploaded-files {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .file-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 14px;
            font-size: 12px;
            color: #333;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-tag.uploading {
            font-style: italic;
            color: #888;
            border-color: #bbb;
        }
        .file-tag.uploading::before {
            content: '⏳';
            margin-right: 2px;
        }
        .file-tag.processing {
            font-style: italic;
            color: #b45309;
            border-color: #fbbf24;
            background: #fffbeb;
        }
        .file-tag.processing::before {
            content: '⏳';
            margin-right: 2px;
        }
        .file-tag.uploaded::before {
            content: '✅';
            margin-right: 2px;
        }
        .file-tag.error {
            border-color: #fc8181;
            background: #fff5f5;
            color: #c53030;
        }
        .file-tag.error::before {
            content: '❌';
            margin-right: 2px;
        }
        .file-tag .remove-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ccc;
            color: #fff;
            font-size: 10px;
            cursor: pointer;
            line-height: 1;
            border: none;
            padding: 0;
            flex-shrink: 0;
        }
        .file-tag .remove-btn:hover {
            background: #999;
        }
        .upload-btn {
            padding: 12px 16px;
            background: #f8f9fa;
            color: #555;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .upload-btn:hover {
            background: #e8e8e8;
            color: #333;
        }
        .user-file-attachment {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid rgba(255,255,255,0.3);
            font-size: 12px;
            opacity: 0.85;
        }
        /* 录音按钮 */
        .mic-btn {
            padding: 12px 16px;
            background: #f8f9fa;
            color: #555;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .mic-btn:hover { background: #e8e8e8; color: #333; }
        .mic-btn.recording {
            background: #fee2e2;
            color: #dc2626;
            border-color: #fca5a5;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(220, 38, 38, 0); }
        }
        .transcribe-hint {
            font-size: 11px;
            color: #888;
            padding: 2px 8px;
            font-style: italic;
        }
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <header>流式聊天测试</header>
    <main>
        <div class="sidebar">
            <div>
                <h3 style="font-size: 14px; color: #666; margin-bottom: 8px;">配置</h3>
                <input type="text" id="baseUrl" value="http://localhost:8000" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; margin-bottom: 12px;">
                <input type="text" id="sessionId" value="stream-test" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px;">
            </div>
            <div>
                <h3 style="font-size: 14px; color: #666; margin-bottom: 8px;">说明</h3>
                <p style="font-size: 12px; color: #666; line-height: 1.6;">
                    此页面用于测试流式聊天接口。<br>
                    • 实时显示推理过程（蓝色背景）<br>
                    • 实时显示回答内容<br>
                    • 底部显示代理类型和状态<br>
                    • 📎 支持上传 PDF/TXT/MD/DOCX，后台异步分析，分析完成前自动锁定发送<br>
                    • 📎 支持上传 JPG/PNG/WEBP 图片，发送时附带图片进行视觉理解
                </p>
            </div>
        </div>
        <div class="main-content">
            <div class="status-bar">
                <div class="status-item">代理: <span id="agentDisplay">-</span></div>
                <div class="status-item">状态: <span id="statusDisplay">就绪</span></div>
                <div class="status-item">耗时: <span id="timeDisplay">0ms</span></div>
            </div>
            <div class="chat-container" id="chatContainer">
                <div class="message assistant-message">
                    你好！我是基于两阶段 Reranker 意图识别的智能代理系统。<br><br>
                    我支持以下能力：<br>
                    • 自由闲聊<br>
                    • RAG 文档问答<br>
                    • MCP 工具调用（计算器等）<br><br>
                    请输入你的问题开始对话！
                </div>
            </div>
            <div class="input-area">
                <input type="file" id="fileInput" accept=".pdf,.txt,.md,.docx,.doc,.jpg,.jpeg,.png,.webp,.gif,.bmp,.tiff">
                <button class="upload-btn" id="uploadBtn" title="上传文件">📎</button>
                <button class="mic-btn" id="micBtn" title="语音输入">🎤</button>
                <div class="input-wrapper">
                    <div class="uploaded-files" id="uploadedFiles"></div>
                    <div id="transcribeHint" class="transcribe-hint" style="display:none;"></div>
                    <textarea id="inputMessage" placeholder="输入消息或点击 🎤 语音输入..." rows="1"></textarea>
                </div>
                <button id="sendBtn">发送</button>
            </div>
        </div>
    </main>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const inputMessage = document.getElementById('inputMessage');
        const sendBtn = document.getElementById('sendBtn');
        const baseUrlInput = document.getElementById('baseUrl');
        const sessionIdInput = document.getElementById('sessionId');
        const agentDisplay = document.getElementById('agentDisplay');
        const statusDisplay = document.getElementById('statusDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const uploadedFilesContainer = document.getElementById('uploadedFiles');
        const micBtn = document.getElementById('micBtn');
        const transcribeHint = document.getElementById('transcribeHint');

        let chatHistory = [];
        let startTime = 0;
        let currentReasoningDiv = null;
        let currentAnswerDiv = null;
        let uploadedFiles = []; // [{ id, type: 'doc'|'image', filename, tagId, status }]

        // ── STT 语音输入相关变量（Web Audio API 直出 WAV）──
        let audioContext = null;
        let mediaStream = null;
        let scriptProcessor = null;
        let isRecording = false;
        let recordedSamples = []; // Float32Array[]

        // 点击开始/停止录音
        micBtn.addEventListener('click', async () => {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        });

        async function startRecording() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });

                audioContext = new AudioContext({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(mediaStream);
                scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

                recordedSamples = [];

                scriptProcessor.onaudioprocess = (e) => {
                    const inputData = e.inputBuffer.getChannelData(0);
                    recordedSamples.push(new Float32Array(inputData));
                };

                source.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination);

                isRecording = true;
                micBtn.classList.add('recording');
                micBtn.title = '点击停止录音';
                sendBtn.disabled = true;
                sendBtn.textContent = '录音中...';

            } catch (err) {
                console.error('麦克风访问被拒绝:', err);
                alert('无法访问麦克风，请检查浏览器权限设置');
            }
        }

        function stopRecording() {
            if (!isRecording) return;

            if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            if (audioContext) { audioContext.close(); audioContext = null; }

            isRecording = false;
            micBtn.classList.remove('recording');
            micBtn.title = '语音输入';
            sendBtn.disabled = false;
            sendBtn.textContent = '发送';

            if (recordedSamples.length > 0) {
                const wavBlob = createWavBlob(recordedSamples, 16000);
                uploadAndTranscribe(wavBlob);
                recordedSamples = [];
            }
        }

        /**
         * 将 Float32Array[] PCM 数据封装为 WAV 格式 Blob
         */
        function createWavBlob(samples, sampleRate) {
            // 合并所有采样数据
            const totalLength = samples.reduce((sum, s) => sum + s.length, 0);
            const merged = new Float32Array(totalLength);
            let offset = 0;
            for (const chunk of samples) {
                merged.set(chunk, offset);
                offset += chunk.length;
            }

            // Float32 → Int16 PCM
            const pcmData = new Int16Array(merged.length);
            for (let i = 0; i < merged.length; i++) {
                const s = Math.max(-1, Math.min(1, merged[i]));
                pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }

            // 构建 WAV 文件
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * bitsPerSample / 8;
            const blockAlign = numChannels * bitsPerSample / 8;
            const dataSize = pcmData.length * 2;
            const headerSize = 44;

            const buffer = new ArrayBuffer(headerSize + dataSize);
            const view = new DataView(buffer);

            // RIFF header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            // fmt chunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);               // PCM format
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            // data chunk
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            // 写入 PCM 数据
            let bufOffset = headerSize;
            for (let i = 0; i < pcmData.length; i++) {
                view.setInt16(bufOffset, pcmData[i], true);
                bufOffset += 2;
            }

            return new Blob([buffer], { type: 'audio/wav' });
        }

        function writeString(view, offset, str) {
            for (let i = 0; i < str.length; i++) {
                view.setUint8(offset + i, str.charCodeAt(i));
            }
        }

        async function uploadAndTranscribe(audioBlob) {
            const baseUrl = baseUrlInput.value.replace(/\/+$/, '');
            transcribeHint.style.display = 'block';
            transcribeHint.textContent = '🎙️ 正在转写...';

            try {
                const formData = new FormData();
                formData.append('file', audioBlob, 'recording.wav');

                const res = await fetch(`${baseUrl}/stt/transcribe`, {
                    method: 'POST',
                    body: formData,
                });

                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.detail || `HTTP ${res.status}`);
                }

                const data = await res.json();

                if (data.text) {
                    inputMessage.value = data.text;
                    inputMessage.focus();
                    inputMessage.dispatchEvent(new Event('input'));
                    transcribeHint.textContent = `✅ 转写完成 (${data.duration_ms}ms)`;
                    setTimeout(() => { transcribeHint.style.display = 'none'; }, 3000);
                } else {
                    transcribeHint.textContent = '⚠️ 未识别到有效语音';
                    setTimeout(() => { transcribeHint.style.display = 'none'; }, 3000);
                }

            } catch (err) {
                console.error('STT error:', err);
                transcribeHint.textContent = `❌ 转写失败: ${err.message}`;
                setTimeout(() => { transcribeHint.style.display = 'none'; }, 4000);
            }
        }

        // 自动调整 textarea 高度
        inputMessage.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // 回车发送（Shift+回车换行）
        inputMessage.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        // 检查是否有正在处理的文件，控制发送按钮
        function updateSendButton() {
            const hasProcessing = uploadedFiles.some(f => f.status === 'processing');
            sendBtn.disabled = hasProcessing;
            if (hasProcessing) {
                sendBtn.textContent = '文件分析中...';
            } else {
                sendBtn.textContent = '发送';
            }
        }

        // 轮询文件处理状态
        async function pollFileStatus(fileId, tagId, sysMsgId, fileName) {
            const baseUrl = baseUrlInput.value.replace(/\/+$/, '');
            while (true) {
                try {
                    const res = await fetch(`${baseUrl}/upload/status/${fileId}`);
                    if (!res.ok) break;
                    const data = await res.json();

                    if (data.status === 'ready') {
                        // 更新标签为已就绪
                        const tag = document.getElementById(tagId);
                        if (tag) {
                            tag.className = 'file-tag uploaded';
                            tag.innerHTML = `${escapeHtml(data.filename)} <button class="remove-btn" onclick="removeFileTag('${tagId}', '${fileId}')">×</button>`;
                        }
                        // 更新系统提示为处理完成
                        const sysMsg = document.getElementById(sysMsgId);
                        if (sysMsg) {
                            sysMsg.innerHTML = `✅ ${escapeHtml(data.filename)} 分析完成（${data.chunks} 个分片）`;
                            sysMsg.style.borderColor = '#86efac';
                            sysMsg.style.background = '#f0fdf4';
                            sysMsg.style.color = '#166534';
                        }
                        // 更新 uploadedFiles 状态
                        const fileEntry = uploadedFiles.find(f => f.id === fileId);
                        if (fileEntry) fileEntry.status = 'ready';
                        updateSendButton();
                        break;
                    } else if (data.status === 'error') {
                        const tag = document.getElementById(tagId);
                        if (tag) {
                            tag.className = 'file-tag error';
                            tag.innerHTML = `${escapeHtml(data.filename)} <button class="remove-btn" onclick="removeFileTag('${tagId}', null)">×</button>`;
                        }
                        // 更新系统提示为处理失败
                        const sysMsg = document.getElementById(sysMsgId);
                        if (sysMsg) {
                            sysMsg.innerHTML = `❌ ${escapeHtml(fileName)} 分析失败`;
                            sysMsg.style.borderColor = '#fc8181';
                            sysMsg.style.background = '#fff5f5';
                            sysMsg.style.color = '#c53030';
                        }
                        const fileEntry = uploadedFiles.find(f => f.id === fileId);
                        if (fileEntry) fileEntry.status = 'error';
                        updateSendButton();
                        break;
                    }
                } catch (err) {
                    console.error('Poll status error:', err);
                    break;
                }
                // 每 1 秒轮询一次
                await new Promise(r => setTimeout(r, 1000));
            }
        }

        // 文件上传逻辑
        uploadBtn.addEventListener('click', () => fileInput.click());

        function isImageExt(filename) {
            const imgExts = ['.jpg', '.jpeg', '.png', '.webp', '.gif', '.bmp', '.tiff'];
            const ext = '.' + filename.split('.').pop().toLowerCase();
            return imgExts.includes(ext);
        }

        fileInput.addEventListener('change', async function() {
            const files = this.files;
            if (!files.length) return;

            const baseUrl = baseUrlInput.value.replace(/\/+$/, '');
            const sessionId = sessionIdInput.value || 'default';

            for (const file of files) {
                const tagId = 'file-tag-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
                const isImage = isImageExt(file.name);

                // 先添加"上传中"标签
                const tag = document.createElement('span');
                tag.className = 'file-tag uploading';
                tag.id = tagId;
                tag.innerHTML = `${escapeHtml(file.name)} <button class="remove-btn" onclick="removeFileTag('${tagId}', null)">×</button>`;
                uploadedFilesContainer.appendChild(tag);

                // 上传文件
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    if (!isImage) {
                        formData.append('session_id', sessionId);
                    }

                    // ====== 图片走 /upload/image，文档走 /upload ======
                    const uploadUrl = isImage ? `${baseUrl}/upload/image` : `${baseUrl}/upload`;

                    const res = await fetch(uploadUrl, {
                        method: 'POST',
                        body: formData,
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);

                    const result = await res.json();
                    const id = isImage ? result.image_id : result.file_id;

                    // 更新标签为"已就绪"
                    tag.className = 'file-tag uploaded';
                    tag.innerHTML = `${escapeHtml(file.name)} <button class="remove-btn" onclick="removeFileTag('${tagId}', '${id}')">×</button>`;

                    // 加入 uploadedFiles 数组
                    uploadedFiles.push({ id, type: isImage ? 'image' : 'doc', filename: file.name, tagId, status: 'ready' });
                    updateSendButton();

                    if (isImage) {
                        addMessage(`🖼️ ${escapeHtml(file.name)} 已上传`, 'system');
                    } else {
                        // 文档显示系统提示并开始轮询
                        const sysMsgId = 'sys-msg-' + id;
                        addMessage(`📎 ${escapeHtml(file.name)} 正在分析文件内容，请耐心等待`, 'system', null, sysMsgId);
                        // 加入时状态为 processing
                        const entry = uploadedFiles.find(f => f.id === id);
                        if (entry) entry.status = 'processing';
                        pollFileStatus(id, tagId, sysMsgId, file.name);
                    }

                } catch (err) {
                    console.error('Upload error:', err);
                    tag.className = 'file-tag error';
                    tag.innerHTML = `${escapeHtml(file.name)} <button class="remove-btn" onclick="removeFileTag('${tagId}', null)">×</button>`;
                }
            }

            // 清空 file input 以便重复选择同一文件
            this.value = '';
        });

        function removeFileTag(tagId, id) {
            const tag = document.getElementById(tagId);
            if (tag) tag.remove();
            if (id) {
                uploadedFiles = uploadedFiles.filter(f => f.id !== id);
            }
            updateSendButton();
        }

        async function sendMessage() {
            const message = inputMessage.value.trim();
            if (!message) return;

            const baseUrl = baseUrlInput.value.replace(/\/+$/, '');
            const sessionId = sessionIdInput.value || 'default';

            // 收集当前文件 ID
            const currentFileIds = uploadedFiles.filter(f => f.type === 'doc').map(f => f.id);
            const currentImageIds = uploadedFiles.filter(f => f.type === 'image').map(f => f.id);
            const currentFileNames = uploadedFiles.map(f => f.filename);

            // 添加用户消息（含附件信息）
            addMessage(message, 'user', currentFileNames);
            inputMessage.value = '';
            inputMessage.style.height = 'auto';
            chatHistory.push({ role: 'user', content: message });

            // 准备开始请求
            startTime = Date.now();
            statusDisplay.textContent = '流式传输中...';
            agentDisplay.textContent = '-';

            // 重置当前消息的 DOM 引用
            currentReasoningDiv = null;
            currentAnswerDiv = document.createElement('div');
            currentAnswerDiv.className = 'message assistant-message';
            // 显示"正在输入"动画
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            typingIndicator.id = 'typingIndicator';
            typingIndicator.innerHTML = '<span></span><span></span><span></span>';
            currentAnswerDiv.appendChild(typingIndicator);
            chatContainer.appendChild(currentAnswerDiv);
            scrollToBottom();

            try {
                const response = await fetch(`${baseUrl}/chat/stream`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId,
                        file_ids: currentFileIds,
                        image_ids: currentImageIds,
                        chat_history: chatHistory,
                    }),
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                // 解析 SSE 流
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                let fullAnswer = '';
                let fullReasoning = '';
                let currentAgent = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;

                        try {
                            const data = JSON.parse(line.slice(6));
                            handleStreamData(data, { fullAnswer, fullReasoning, currentAgent });
                        } catch (e) {
                            console.error('Parse error:', e);
                        }
                    }
                }

                // 请求完成
                const elapsed = Date.now() - startTime;
                statusDisplay.textContent = '完成';
                timeDisplay.textContent = `${elapsed}ms`;

            } catch (error) {
                console.error('Error:', error);
                addMessage(`错误: ${error.message}`, 'error');
                statusDisplay.textContent = '错误';
                timeDisplay.textContent = `${Date.now() - startTime}ms`;
            }
        }

        function handleStreamData(data, ctx) {
            switch (data.type) {
                case 'reasoning':
                    // 推理过程，实时显示
                    if (!currentReasoningDiv) {
                        currentReasoningDiv = document.createElement('div');
                        currentReasoningDiv.className = 'reasoning-message';
                        chatContainer.appendChild(currentReasoningDiv);
                    }
                    currentReasoningDiv.innerHTML += escapeHtmlWithBr(data.content);
                    scrollToBottom();
                    break;

                case 'answer':
                    // 第一次收到内容时移除 typing indicator
                    const typingEl = document.getElementById('typingIndicator');
                    if (typingEl) typingEl.remove();
                    // 回答内容
                    if (currentAnswerDiv) {
                        currentAnswerDiv.innerHTML += escapeHtmlWithBr(data.content);
                        scrollToBottom();
                    }
                    ctx.fullAnswer += data.content;
                    break;

                case 'waiting':
                    // 文件正在分析中，显示等待消息
                    if (currentAnswerDiv) {
                        currentAnswerDiv.innerHTML = `<em style="color: #b45309;">⏳ ${escapeHtml(data.message)}</em>`;
                        scrollToBottom();
                    }
                    statusDisplay.textContent = '等待文件分析...';
                    break;

                case 'waiting_done':
                    // 文件分析完成，清除等待消息
                    if (currentAnswerDiv) {
                        const typingIndicator2 = document.createElement('div');
                        typingIndicator2.className = 'typing-indicator';
                        typingIndicator2.id = 'typingIndicator';
                        typingIndicator2.innerHTML = '<span></span><span></span><span></span>';
                        currentAnswerDiv.innerHTML = '';
                        currentAnswerDiv.appendChild(typingIndicator2);
                        scrollToBottom();
                    }
                    statusDisplay.textContent = '流式传输中...';
                    break;

                case 'done':
                    // 结束
                    ctx.currentAgent = data.agent_used;
                    agentDisplay.textContent = data.agent_used.toUpperCase();
                    agentDisplay.className = `agent-badge agent-${data.agent_used}`;
                    // 将助手的回答添加到历史记录
                    chatHistory.push({ role: 'assistant', content: ctx.fullAnswer });
                    break;

                case 'error':
                    // 清理 typing 动画和空的回答气泡
                    if (currentAnswerDiv) {
                        const typingEl2 = document.getElementById('typingIndicator');
                        if (typingEl2) typingEl2.remove();
                        currentAnswerDiv.remove();
                        currentAnswerDiv = null;
                    }
                    addMessage(data.message, 'error');
                    statusDisplay.textContent = '已拦截';
                    timeDisplay.textContent = `${Date.now() - startTime}ms`;
                    break;
            }
        }

        function addMessage(content, type, fileNames, msgId) {
            const msgDiv = document.createElement('div');
            if (msgId) msgDiv.id = msgId;
            if (type === 'error') {
                msgDiv.className = 'message error-message';
            } else if (type === 'system') {
                msgDiv.className = 'message system-message';
            } else {
                msgDiv.className = `message ${type === 'user' ? 'user-message' : 'assistant-message'}`;
            }
            let html = content.replace(/\n/g, '<br>');
            // 用户消息中显示附件
            if (type === 'user' && fileNames && fileNames.length > 0) {
                html += `<div class="user-file-attachment">📎 ${fileNames.map(n => escapeHtml(n)).join('<br>📎 ')}</div>`;
            }
            msgDiv.innerHTML = html;
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }



        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeHtmlWithBr(text) {
            return escapeHtml(text).replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
